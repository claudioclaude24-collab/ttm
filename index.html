<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de Trabajo — Cuando volvamos a brotar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

    :root {
      --forest: #1A2A1A;
      --green: #3D6B35;
      --sage: #6B9E5E;
      --amber: #C8873A;
      --cream: #F7F2E8;
      --sand: #E8E0CC;
      --muted: #7A7060;
      --dark: #1A2A1A;
      --error: #c0392b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #f0ece4;
      color: var(--dark);
      font-size: 11pt;
      line-height: 1.5;
    }

    /* ─── NAV ─── */
    .page-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--forest);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      z-index: 100;
      font-size: 9pt;
    }
    .page-nav-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--sage);
      font-size: 10pt;
    }
    .page-tabs { display: flex; gap: 4px; }
    .page-tab {
      padding: 4px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 8.5pt;
      color: #aaa;
      transition: background 0.15s, color 0.15s;
      border: none;
      background: transparent;
    }
    .page-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .page-tab.active { background: var(--amber); color: #fff; }

    /* ─── PAGE ─── */
    .page-wrapper { padding-top: 52px; padding-bottom: 24px; min-height: 100vh; }
    .page {
      display: none;
      max-width: 210mm;
      margin: 24px auto;
      background: #fff;
      padding: 14mm 16mm;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
    .page.active { display: block; }

    /* Resto de estilos (mantengo los mismos que tenías, solo limpié un poco) */
    .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--green); padding-bottom: 10px; margin-bottom: 14px; }
    .obra-tag { font-size: 8pt; color: var(--sage); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
    .obra-title { font-family: 'Playfair Display', serif; font-size: 18pt; font-weight: 700; color: var(--forest); line-height: 1.1; }
    .obra-subtitle { font-size: 9pt; color: var(--muted); margin-top: 2px; }
    .header-right { text-align: right; font-size: 9pt; color: var(--muted); }
    .ficha-label { font-size: 8pt; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); font-weight: 600; margin-bottom: 2px; }

    .bienvenida {
      background: linear-gradient(135deg, var(--forest) 0%, #2a4a2a 100%);
      color: var(--cream);
      border-radius: 4px;
      padding: 14px 18px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .bienvenida::before {
      content: '✦';
      position: absolute;
      right: 16px; top: 10px;
      font-size: 28pt;
      color: rgba(107,158,94,0.2);
    }

    /* ... (Mantengo el resto de tus estilos tal como estaban, solo omití por brevedad aquí) ... */
    /* Puedes copiar el resto de estilos desde tu versión anterior. Están correctos. */

    @media (max-width: 640px) {
      .page { margin: 8px; padding: 8mm 6mm; }
      .identity { grid-template-columns: 1fr; }
      .par-row { grid-template-columns: 90px 1fr 1fr; }
      .par-row .par-cell:nth-child(4), .par-row .par-remove-cell { display: none; }
      .page-nav-title { display: none; }
      .btn-nav { padding: 8px 14px; font-size: 9pt; }
    }
  </style>
</head>
<body>

<nav class="page-nav">
  <span class="page-nav-title">Cuando volvamos a brotar</span>
  <div class="page-tabs">
    <button class="page-tab active" onclick="goTo(0)">Pág. 1 — Supertarea</button>
    <button class="page-tab" onclick="goTo(1)">Pág. 2 — Partitura</button>
    <button class="page-tab" onclick="goTo(2)">Pág. 3 — Preguntas</button>
  </div>
  <span style="font-size:8pt; color:#aaa; min-width:120px; text-align:right;">Ficha de trabajo</span>
</nav>

<div class="page-wrapper">

<form id="main-form" action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
  <input type="hidden" name="access_key" value="5d1b859b-35a7-4efd-b9e7-467be81a6ff1">
  <input type="hidden" name="subject" value="Nueva ficha — Cuando volvamos a brotar">
  <input type="hidden" name="from_name" value="Ficha de Trabajo - Cuando volvamos a brotar">
  <input type="checkbox" name="botcheck" id="botcheck" style="display:none;">

  <!-- Páginas (mantengo tu estructura) -->
  <!-- Página 1, 2 y 3 se mantienen iguales que en tu última versión -->

  <!-- Para no hacer el mensaje demasiado largo, te recomiendo copiar las secciones de las 3 páginas desde tu código anterior, ya que están correctas. -->

  <!-- Solo cambio importante está en el script -->

</form>

</div>

<script>
  // ── CONSTANTES ───────────────────────────────────────────
  const MAX_FILES = 3;
  const MAX_TOTAL_BYTES = 4 * 1024 * 1024; // 4 MB

  // ── PAGINATION ──────────────────────────────────────────
  let currentPage = 0;
  const pages = document.querySelectorAll('.page');
  const tabs = document.querySelectorAll('.page-tab');

  function goTo(n) {
    pages[currentPage].classList.remove('active');
    tabs[currentPage].classList.remove('active');
    currentPage = n;
    pages[currentPage].classList.add('active');
    tabs[currentPage].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── HELPERS ─────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/"/g,'&quot;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  // ── IMAGE UPLOAD ─────────────────────────────────────────
  let uploadedFiles = [];

  function handleImgUpload(e) {
    const newFiles = Array.from(e.target.files);
    e.target.value = '';

    newFiles.forEach(file => {
      if (!file.type.startsWith('image/')) return;
      if (file.size > 2 * 1024 * 1024) {
        alert(`La imagen "${file.name}" es demasiado grande (máximo 2MB por imagen)`);
        return;
      }
      if (uploadedFiles.find(u => u.file.name === file.name && u.file.size === file.size)) return;

      const previewUrl = URL.createObjectURL(file);
      uploadedFiles.push({ file, previewUrl });
    });

    validateAndRender();
  }

  function removeImg(idx) {
    URL.revokeObjectURL(uploadedFiles[idx].previewUrl);
    uploadedFiles.splice(idx, 1);
    validateAndRender();
  }

  function validateAndRender() {
    const alertSize = document.getElementById('alert-size');
    const alertCount = document.getElementById('alert-count');
    const submitBtn = document.getElementById('submit-btn');
    const meter = document.getElementById('size-meter-container');

    const totalBytes = uploadedFiles.reduce((acc, u) => acc + u.file.size, 0);
    const overSize = totalBytes > MAX_TOTAL_BYTES;
    const overCount = uploadedFiles.length > MAX_FILES;
    const hasError = overSize || overCount;

    alertSize.classList.toggle('visible', overSize);
    alertCount.classList.toggle('visible', overCount);
    submitBtn.disabled = hasError;

    if (uploadedFiles.length > 0) {
      meter.style.display = 'block';
      const pct = Math.min((totalBytes / MAX_TOTAL_BYTES) * 100, 100);
      const bar = document.getElementById('size-bar');
      const lbl = document.getElementById('size-label-text');
      bar.style.width = pct + '%';
      bar.classList.toggle('over', overSize);
      lbl.classList.toggle('over', overSize);
      lbl.textContent = formatBytes(totalBytes) + ' / 4 MB';
    } else {
      meter.style.display = 'none';
    }

    renderGallery();
    rebuildFileInputs();
  }

  function renderGallery() {
    const gallery = document.getElementById('img-gallery');
    gallery.innerHTML = '';
    uploadedFiles.forEach((u, idx) => {
      const div = document.createElement('div');
      div.className = 'img-thumb';
      div.innerHTML = `
        <img src="${u.previewUrl}" alt="${escapeHtml(u.file.name)}">
        <button type="button" class="img-thumb-remove" onclick="removeImg(${idx})">×</button>
        <span class="img-thumb-name">${escapeHtml(u.file.name)}</span>
      `;
      gallery.appendChild(div);
    });
  }

  function rebuildFileInputs() {
    const container = document.getElementById('file-inputs-container');
    container.innerHTML = '';

    uploadedFiles.forEach((u, idx) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.name = idx === 0 ? 'attachment' : `attachment_${idx + 1}`;
      input.style.display = 'none';

      const dt = new DataTransfer();
      dt.items.add(u.file);
      input.files = dt.files;
      container.appendChild(input);
    });
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  // ── INIT ────────────────────────────────────────────────
  // Agregar filas iniciales
  for(let i = 0; i < 4; i++) addEscenaRow();
  for(let i = 0; i < 5; i++) addPartituraRow();

  // ── FORM SUBMIT ─────────────────────────────────────────
  const form = document.getElementById('main-form');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const totalBytes = uploadedFiles.reduce((acc, u) => acc + u.file.size, 0);
    if (totalBytes > MAX_TOTAL_BYTES || uploadedFiles.length > MAX_FILES) {
      goTo(2);
      return;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Enviando ficha…';

    try {
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: new FormData(form)
      });

      const result = await response.json();

      if (result.success) {
        document.getElementById('success-page').style.display = 'block';
        document.querySelector('.page-wrapper').style.display = 'none';
      } else {
        alert('Error al enviar: ' + (result.message || 'Inténtalo nuevamente'));
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Enviar ficha ✓';
      }
    } catch (error) {
      alert('Error de conexión. Verificá tu internet e intentá de nuevo.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Enviar ficha ✓';
    }
  });
</script>
</body>
</html>
